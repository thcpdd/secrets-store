services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secret-store-backend
    volumes:
      - secret-data:/data
      - ./backend/main.py:/app/main.py:ro
      - ./backend/crypto.py:/app/crypto.py:ro
      - ./backend/auth.py:/app/auth.py:ro
      - ./backend/database.py:/app/database.py:ro
      - ./backend/models.py:/app/models.py:ro
      - ./backend/schemas.py:/app/schemas.py:ro
    environment:
      - DATABASE_PATH=/data/secrets.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
    restart: unless-stopped
    networks:
      - secret-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secret-store-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro  # 挂载前端代码
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - secret-network

volumes:
  secret-data:
    driver: local

networks:
  secret-network:
    driver: bridge
