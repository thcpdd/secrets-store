<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥存储 | 安全保险库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">密钥存储</span>
            </div>
            <div class="header-controls">
                <button class="btn-theme" id="themeToggle" title="Toggle theme">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <span class="username" id="usernameDisplay"></span>
                <button class="btn-logout" id="logoutBtn">退出登录</button>
            </div>
        </header>

        <!-- Messages -->
        <div class="message error" id="errorMessage">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span></span>
        </div>
        <div class="message success" id="successMessage">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span></span>
        </div>

        <!-- Main Content -->
        <main class="main">
            <div class="vault-container">
                <!-- Vault Header -->
                <div class="vault-header">
                    <h2 class="vault-title">我的密钥</h2>
                    <button class="btn-add" id="addSecretBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        添加密钥
                    </button>
                </div>

                <!-- Add Secret Modal -->
                <div class="modal" id="addSecretModal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 class="modal-title">添加新密钥</h3>
                            <button class="btn-close" id="closeAddModal">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 6L6 18M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                        <div class="modal-body">
                            <div class="add-secret-error" id="addSecretError">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="12" y1="8" x2="12" y2="12"/>
                                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                                <span></span>
                            </div>
                            <form id="addSecretForm">
                                <div class="form-group" style="margin-bottom: 1rem;">
                                    <label class="secret-label" for="secretName">名称</label>
                                    <input type="text" class="form-input" id="secretName" required placeholder="例如：API密钥、数据库密码">
                                </div>
                                <div class="form-group" style="margin-bottom: 1rem;">
                                    <label class="secret-label" for="secretContent">密钥内容</label>
                                    <input type="text" class="form-input" id="secretContent" required placeholder="例如：sk-1234567890">
                                </div>
                                <div class="form-group" style="margin-bottom: 1rem;">
                                    <label class="secret-label" for="secretNote">备注（可选）</label>
                                    <textarea class="form-input" id="secretNote" rows="2" placeholder="其他说明..."></textarea>
                                </div>
                                <div class="form-group" style="margin-bottom: 1rem;">
                                    <label class="secret-label" for="secretPassword">您的密码</label>
                                    <input type="password" class="form-input" id="secretPassword" required placeholder="输入密码进行加密">
                                </div>
                                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                                    <button type="submit" class="btn-submit-full">添加密钥</button>
                                    <button type="button" class="btn-cancel" id="cancelAdd" style="flex: 1;">取消</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Edit Secret Form -->
                <div class="inline-form edit" id="editSecretFormContainer">
                    <form class="inline-form-inner" id="editSecretForm">
                        <input type="hidden" id="editSecretId">
                        <div class="inline-form-grid">
                            <div class="form-group">
                                <label class="form-label" for="editSecretName">名称</label>
                                <input type="text" class="form-input" id="editSecretName" required placeholder="例如：API密钥">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="editSecretContent">密钥内容</label>
                                <input type="text" class="form-input" id="editSecretContent" required placeholder="密钥的实际内容">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="editSecretNote">备注</label>
                                <textarea class="form-input" id="editSecretNote" rows="1" placeholder="关于此密钥的说明..."></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="editSecretPassword">您的密码</label>
                                <input type="password" class="form-input" id="editSecretPassword" required placeholder="输入密码">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-submit">更新</button>
                            <button type="button" class="btn-cancel" id="cancelEdit">取消</button>
                        </div>
                    </form>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <p class="empty-state-text">暂无密钥，点击"添加密钥"创建您的第一个密钥！</p>
                </div>

                <!-- Secrets Table -->
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>备注</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="secretsList">
                            <!-- Secrets will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- View Secret Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="viewModalTitle"></h3>
                <button class="btn-close" id="closeViewModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="viewModalContent"></div>
        </div>
    </div>

    <!-- Password Verification Modal -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">验证密码</h3>
                <button class="btn-close" id="closePasswordModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="password-error" id="passwordError">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span></span>
                </div>
                <form class="password-form" id="passwordVerifyForm">
                    <input type="hidden" id="verifySecretId">
                    <div>
                        <label class="secret-label" for="verifyPassword">密码</label>
                        <input type="password" class="form-input" id="verifyPassword" required placeholder="输入您的密码以查看密钥">
                    </div>
                    <button type="submit" class="btn-submit-full">查看密钥</button>
                </form>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
