<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥存储 - 登录</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Shield background -->
                    <path d="M32 4 L56 14 V32 C56 46 46 56 32 60 C18 56 8 46 8 32 V14 L32 4Z" fill="currentColor" opacity="0.1"/>
                    <path d="M32 4 L56 14 V32 C56 46 46 56 32 60 C18 56 8 46 8 32 V14 L32 4Z" stroke="currentColor" stroke-width="2" fill="none"/>

                    <!-- Key icon -->
                    <circle cx="28" cy="30" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M33 30 L44 30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M44 30 L44 26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M44 30 L44 34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M44 26 L48 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M44 34 L48 36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

                    <!-- Lock symbol overlay -->
                    <rect x="22" y="36" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <path d="M25 36 V32 A3 3 0 0 1 31 32 V36" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="logo-text">密钥存储</div>
        </div>

        <!-- Tab Buttons -->
        <div class="tab-buttons">
            <button id="loginTab" class="tab-button active">登录</button>
            <button id="registerTab" class="tab-button">注册</button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="message message-error">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span></span>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="message message-success">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form tab-content">
            <div class="form-group">
                <label class="form-label" for="loginUsername">用户名</label>
                <input type="text" class="form-input" id="loginUsername" name="username" required
                    placeholder="输入您的用户名" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="loginPassword">密码</label>
                <input type="password" class="form-input" id="loginPassword" name="password" required
                    placeholder="输入您的密码" autocomplete="current-password">
            </div>

            <button type="submit" class="submit-button">
                <span>登录</span>
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="form tab-content hidden">
            <div class="form-group">
                <label class="form-label" for="registerUsername">用户名</label>
                <input type="text" class="form-input" id="registerUsername" name="username" required minlength="3"
                    placeholder="选择用户名（至少3个字符）" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="registerPassword">密码</label>
                <input type="password" class="form-input" id="registerPassword" name="password" required minlength="6"
                    placeholder="选择密码（至少6个字符）" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">确认密码</label>
                <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" required minlength="6"
                    placeholder="再次输入密码" autocomplete="new-password">
            </div>

            <button type="submit" class="submit-button">
                <span>注册</span>
            </button>
        </form>
    </div>

    <script src="api.js"></script>
    <script src="login.js"></script>
</body>
</html>
