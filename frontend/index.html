<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥存储 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">密钥存储</h1>

        <!-- Tab Buttons -->
        <div class="flex mb-6">
            <button id="loginTab" class="flex-1 py-2 px-4 text-center font-semibold text-blue-600 border-b-2 border-blue-600 transition">
                登录
            </button>
            <button id="registerTab" class="flex-1 py-2 px-4 text-center font-semibold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition">
                注册
            </button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"></div>

        <!-- Success Message -->
        <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"></div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="loginUsername" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="loginUsername" name="username" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="输入您的用户名">
            </div>

            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="loginPassword" name="password" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="输入您的密码">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition">
                登录
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label for="registerUsername" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="registerUsername" name="username" required minlength="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="选择用户名（至少3个字符）">
            </div>

            <div>
                <label for="registerPassword" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="registerPassword" name="password" required minlength="6"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="选择密码（至少6个字符）">
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="再次输入密码">
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition">
                注册
            </button>
        </form>
    </div>

    <script src="api.js"></script>
    <script src="login.js"></script>
</body>
</html>
